<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XYZ Company</title>
<link rel="stylesheet" href="css.css">
</head>
<body>

<div class="header">
  <h1>XYZ-COMPANY</h1>
  <p>CURRENCY EXCHANGE PLATFORM</p>
</div>

<div class="card">
  <div class="form-row">
    
    <div>
      <label>Amount</label>
      <input type="number" id="amount" placeholder="Enter amount">
    </div>

    <div>
      <label>From</label>
      <select id="from">
        <option value="USD">USA - USD</option>
        <option value="EUR">EUR - €</option>
        <option value="RWF">Rwanda - RWF</option>
      </select>
    </div>

    <div>
      <label>To</label>
      <select id="to">
        <option value="RWF">Rwanda - RWF</option>
        <option value="USD">USA - USD</option>
        <option value="EUR">EUR - €</option>
      </select>
    </div>

  </div>

  <button onclick="convert()">Convert</button>

  <div class="result">
    <p>Result</p>
    <h2 id="result">0</h2>
  </div>
</div>

<script src="calx.js"></script>
</body>
</html>
